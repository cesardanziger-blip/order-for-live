services:
  api:
    build:
      context: ./backend
    container_name: orderforlive-api

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development

  frontend:
    build:
      context: ./frontend/react-baby

    container_name: orderforlive-web

    ports:
      - "3000:80"

    depends_on:
      - api